services:
  # Backend Django Web Service (SQLite)
  - type: web
    name: careerpath-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://careerpath-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://careerpath-frontend.onrender.com

  # Frontend Vite/React Static Site
  - type: web
    name: careerpath-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: careerpath-backend
          property: host
      - key: NODE_VERSION
        value: "20"

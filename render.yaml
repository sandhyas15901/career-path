services:
  # Backend Django Web Service
  - type: web
    name: careerpath-backend
    env: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: careerpath-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://careerpath-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://careerpath-frontend.onrender.com

  # Frontend Vite/React Static Site
  - type: web
    name: careerpath-frontend
    env: static
    buildCommand: npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: careerpath-backend
          property: host
      - key: NODE_VERSION
        value: "20"

databases:
  - name: careerpath-db
    plan: free
